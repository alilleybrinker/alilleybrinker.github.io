name: Deploy Website

# Runs on pushed to the default branch but can also be
# run manually from the GitHub Actions page.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the `GITHUB_TOKEN` to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as
# we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # Check out the repository.
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Setup GitHub Pages
      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Website
        run: |
          npm ci
          npm run build

      # Upload the output of the build as an Actions artifact so the deploy
      # step can pick it up and use it.
      - name: Upload Build Output
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  #==========================================================================
  # Deploy the site to GitHub Pages
  #--------------------------------------------------------------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
