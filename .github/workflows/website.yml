name: Deploy website

# Runs on pushed to the default branch but can also be
# run manually from the GitHub Actions page.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the `GITHUB_TOKEN` to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as
# we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Build and upload website
        uses: withastro/action@v6

  #==========================================================================
  # Deploy the site to GitHub Pages
  #--------------------------------------------------------------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
